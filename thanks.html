<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | VIZIQ</title>

  <style>
    :root {
      --primary: #0099A8;
      --dark: #0f172a;
      --text: #334155;
      --light: #f8fafc;
      --border: #e2e8f0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #eef8fa 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .thank-you-card {
      background: #ffffff;
      max-width: 760px;
      width: 100%;
      padding: 64px 48px;
      border-radius: 28px;
      border: 1px solid var(--border);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .brand {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 2px;
      color: var(--primary);
      margin-bottom: 36px;
    }

    .tick {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: rgba(0, 153, 168, 0.12);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 800;
      margin: 0 auto 28px;
    }

    h1 {
      font-size: 48px;
      line-height: 1.1;
      color: var(--dark);
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .button {
      display: inline-block;
      margin-top: 28px;
      padding: 16px 32px;
      background: var(--primary);
      color: #ffffff;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 700;
    }

    .button:hover {
      opacity: 0.9;
    }

    footer {
      margin-top: 42px;
      font-size: 14px;
      color: #64748b;
    }

    .watermark {
      position: absolute;
      right: -30px;
      bottom: -45px;
      font-size: 190px;
      font-weight: 900;
      color: var(--primary);
      opacity: 0.04;
      pointer-events: none;
    }

    @media (max-width: 700px) {
      .thank-you-card {
        padding: 44px 28px;
      }

      h1 {
        font-size: 36px;
      }

      p {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <main class="thank-you-card">
    <div class="watermark">V</div>

    <div class="brand">VIZIQ</div>

    <div class="tick">✓</div>

    <h1>Thank you</h1>

    <p>Your enquiry has been submitted successfully.</p>

    <p>We’ll review your message and come back to you shortly.</p>

    <a class="button" href="https://www.viziqdata.com">Return to website</a>

    <footer>
      © 2026 VIZIQ Data Assurance. All rights reserved.
    </footer>
  </main>
</body>
</html>
